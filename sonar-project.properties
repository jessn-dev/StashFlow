# Project identification
sonar.projectKey=jessn-dev_StashFlow
sonar.organization=jbn-dev

# Analysis setup
sonar.sources=.
sonar.exclusions=**/node_modules/**,**/dist/**,**/.next/**,**/coverage/**,**/*.test.ts,**/*.spec.ts,supabase/migrations/**,apps/mobile/**

# Python Precision (Targets apps/backend-py version)
sonar.python.version=3.12

# TypeScript Configuration
# Points to project-specific configs to resolve dependencies and extended files correctly
sonar.typescript.tsconfigPaths=tsconfig.base.json,apps/web/tsconfig.json,packages/core/tsconfig.json,packages/api/tsconfig.json

# Coverage
sonar.javascript.lcov.reportPaths=packages/core/coverage/lcov.info,packages/api/coverage/lcov.info,apps/web/coverage/lcov.info
sonar.coverage.exclusions=**/*.test.ts,**/*.spec.ts,**/__tests__/**,**/test/**
