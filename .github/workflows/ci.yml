name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Run Tests with Coverage
        id: test-run
        run: pnpm test:coverage
        continue-on-error: true

      - name: Code Coverage Summary Report
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: '**/coverage/lcov.info'
          badge: true
          fail_below_min: true # This will mark this step as failed but won't stop the next step
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: '60 80'
        continue-on-error: true

      - name: Add Coverage PR Comment
        uses: thollander/actions-comment-pull-request@v3
        if: github.event_name == 'pull_request'
        with:
          filePath: code-coverage-results.md

      - name: Check Final Status
        if: steps.test-run.outcome == 'failure'
        run: |
          echo "Tests or Coverage thresholds failed. Blocking merge."
          exit 1


