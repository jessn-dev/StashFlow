name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs on the same ref — saves CI minutes on rapid pushes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Typecheck + Lint + Unit Tests ──────────────────────────────────────────
  test:
    name: Typecheck, Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # tsc --noEmit on all packages
      - name: Typecheck packages
        run: pnpm typecheck

      # apps/web lint script is also tsc --noEmit (no ESLint config yet)
      - name: Lint
        run: pnpm lint

      # Coverage thresholds enforced in vitest.config.ts per package:
      # @stashflow/core 90% | @stashflow/api 70% | apps/web 20%
      # CI fails automatically if thresholds are not met.
      - name: Unit tests with coverage
        run: pnpm test:coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: |
            packages/core/coverage/
            packages/api/coverage/
          retention-days: 7

  # ─── Security: dependency audit + secret scan ────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Gitleaks needs full history to scan all commits

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fails on high/critical CVEs. Use --audit-level=moderate to tighten.
      # Run `pnpm audit --fix` locally to resolve findings.
      - name: Dependency vulnerability audit
        run: pnpm audit --audit-level=high

      # Installs Gitleaks from official releases — no license required.
      # Add a .gitleaks.toml at repo root to tune allowlist rules.
      - name: Install Gitleaks
        run: |
          curl -sSfL \
            https://github.com/gitleaks/gitleaks/releases/download/v8.27.2/gitleaks_8.27.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Secret scan
        run: gitleaks detect --source . --redact --no-banner

  # ─── E2E: Playwright — PRs to develop only ───────────────────────────────────
  # Requires repository secrets: NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY
  # Configure these in GitHub → Settings → Secrets and variables → Actions
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request' && github.base_ref == 'develop'

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps

      - name: Run E2E tests
        working-directory: apps/web
        run: pnpm exec playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  # ─── Database: RLS policy tests (pgTAP) ──────────────────────────────────
  rls-tests:
    name: RLS Policy Tests
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local
        run: supabase start

      - name: Run pgTAP tests
        run: supabase test db

  # ─── Deployment (Phase 7 Stub) ──────────────────────────────────────────────
  # Gated to main branch pushes. Requires VERCEL_TOKEN, ORG_ID, PROJECT_ID.
  deploy:
    name: Deploy to Production
    needs: [test, security, rls-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy (Stub)
        run: echo "Production deployment triggered. Follow Phase 7 of docs/OPERATIONS.md to finalize wiring."
